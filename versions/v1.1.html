<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0" />
  <title>EssentialMC — v1.1</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .ver-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      text-align: center;
    }
    .ver-card {
      background: var(--bg2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 52px 48px;
      max-width: 520px;
      width: 100%;
    }
    .ver-card .section-label { margin-bottom: 12px; }
    .ver-card h1 {
      font-family: var(--font-pixel);
      font-size: 2.8rem;
      color: var(--green-bright);
      text-shadow: 0 2px 0 rgba(0,0,0,0.5), 0 0 20px var(--green-glow);
      margin-bottom: 8px;
    }
    .ver-card .sub {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    .changelog {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      text-align: left;
      margin-bottom: 32px;
    }
    .changelog p {
      font-size: 0.82rem;
      color: var(--text-mid);
      line-height: 1.7;
    }
    .changelog strong {
      color: var(--green-bright);
      font-family: var(--font-pixel);
      font-size: 0.75rem;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      font-family: var(--font-pixel);
      font-size: 0.92rem;
      padding: 14px 36px;
      border-radius: var(--radius-sm);
      border-bottom: 3px solid #3d6b28;
      letter-spacing: 0.5px;
      transition: transform 0.1s, border-bottom-width 0.1s;
      width: 100%;
    }
    .dl-btn:hover { transform: translateY(1px); border-bottom-width: 2px; }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--text-dim);
      font-size: 0.83rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--green-bright); }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <span></span><span></span><span></span><span></span>
        </div>
        EssentialMC
      </a>
    </div>
  </nav>

  <div class="ver-page">
    <div class="ver-card">
      <span class="section-label">Release</span>
      <h1>v1.1</h1>
      <p class="sub">MC 1.16 &nbsp;·&nbsp; Feb 2024</p>

      <div class="changelog">
        <strong>Changelog</strong>
        <p>Spawn system with /spawn and /setspawn. Bug fixes from initial release.</p>
      </div>

      <!-- Replace href with the real .jar URL when ready -->
      <a href="../downloads/EssentialMC-v1.1.jar" class="dl-btn" download>
        ⬇ Download v1.1 .jar
      </a>
      <a href="../index.html#versions" class="back-link">← Back to all versions</a>
    </div>
  </div>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
